# =============================================================
# AiresTestEnv — nginx production config for React/Vite SPA
# =============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options              "DENY"                          always;
    add_header X-Content-Type-Options       "nosniff"                       always;
    add_header X-XSS-Protection             "1; mode=block"                 always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains; preload" always;

    # Content Security Policy — allow Stripe JS, Cognito, SES-via-API
    add_header Content-Security-Policy
        "default-src 'self';
         script-src  'self' 'unsafe-inline' https://js.stripe.com;
         style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
         font-src    'self' https://fonts.gstatic.com;
         img-src     'self' data: https:;
         frame-src   https://js.stripe.com;
         connect-src 'self'
                     https://*.amazonaws.com
                     https://cognito-idp.ca-central-1.amazonaws.com
                     https://ca-central-184cnd8m6x.auth.ca-central-1.amazoncognito.com
                     https://test.aires-risk.com
                     https://api.stripe.com
                     https://api.stripe.com;"
        always;

    # ── Gzip compression ─────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml
        font/woff
        font/woff2;

    # ── Static asset caching ──────────────────────────────────
    # Vite outputs hashed filenames — safe to cache aggressively
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Health check endpoint (used by ECS + Synthetics) ─────
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── SPA catch-all: send all routes to index.html ─────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Deny hidden files (.env, .git, etc.) ─────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Error pages ───────────────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}

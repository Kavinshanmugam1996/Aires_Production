# ==============================================================
# AiresTestEnv - docker-compose.yml
# Local dev / smoke-test only.
# Production: ECS Fargate + secrets from AWS Secrets Manager.
#
# Usage:
#   cp server/.env.example server/.env  (fill in secrets)
#   cp client/.env.example client/.env  (fill in public vars)
#   docker compose up --build
#
# To upgrade Node/nginx versions without editing Dockerfiles:
#   docker compose build --build-arg NODE_VERSION=22-alpine3.21
# ==============================================================

# NOTE: "version:" key removed — deprecated since Docker Compose v2 (2023).
# Requires Docker Desktop >= 4.13 or docker-compose-plugin >= 2.x

services:

  # ---------- Backend (Node/Express) ----------
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-20-alpine3.21}
    image: airesperson/aires-inspect-server:local
    container_name: aires-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      PORT: "8080"
      AWS_DEFAULT_REGION: ca-central-1
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      COGNITO_REGION: ca-central-1
      COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID:-ca-central-1_84cnd8m6x}
      COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID:-7rl33f6cq2bjpb8adsh1kq40b7}
      COGNITO_DOMAIN: ${COGNITO_DOMAIN:-ca-central-184cnd8m6x.auth.ca-central-1.amazoncognito.com}
      SES_FROM_EMAIL: ${SES_FROM_EMAIL:-no-reply@test.aires-risk.com}
      SES_REGION: ca-central-1
      S3_BUCKET: ${S3_BUCKET:-aireslite-ap-iwdnsc1rb8w457a9mhyw9xqatw3kkcan1a-s3alias}
      SNS_TOPIC_ARN: ${SNS_TOPIC_ARN:-arn:aws:sns:ca-central-1:543444658305:aires-payment-notifications}
    volumes:
      - ./server/data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------- Frontend (React/Vite -> nginx) ----------
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-20-alpine3.21}
        NGINX_VERSION: ${NGINX_VERSION:-1.27-alpine3.21}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY}
        VITE_COGNITO_REGION: ca-central-1
        VITE_COGNITO_USER_POOL_ID: ${VITE_COGNITO_USER_POOL_ID:-ca-central-1_84cnd8m6x}
        VITE_COGNITO_CLIENT_ID: ${VITE_COGNITO_CLIENT_ID:-7rl33f6cq2bjpb8adsh1kq40b7}
        VITE_COGNITO_DOMAIN: ${VITE_COGNITO_DOMAIN:-ca-central-184cnd8m6x.auth.ca-central-1.amazoncognito.com}
    image: airesperson/aires-inspect-client:local
    container_name: aires-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
